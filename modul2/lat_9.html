<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #add8e6;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      h1 {
        color: white;
        font-size: 40px;
        text-align: center;
        margin-bottom: 20px;
      }
      p {
        background-color: #d3d3d3;
        color: black;
        padding: 15px;
        border-radius: 10px;
        max-width: 800px;
        margin: 0 auto 20px auto;
        box-sizing: border-box;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
      .box1,
      .box2,
      .box3 {
        border: 2px solid black;
        padding: 10px;
        height: 150px;
        border-radius: 10px;
        box-sizing: border-box;
      }
      .box1 {
        background-color: #ff9999;
      }
      .box2 {
        background-color: #99ff99;
      }
      .box3 {
        background-color: #9999ff;
      }

      @media only screen and (max-width: 768px) {
        .container {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media only screen and (max-width: 480px) {
        h1 {
          font-size: 28px;
        }
        .container {
          grid-template-columns: 1fr;
        }
        .box1,
        .box2,
        .box3 {
          height: 120px;
        }
        p {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <h1>Praktikum CSS</h1>
    <p>
      Halaman ini menggunakan CSS Grid dan responsive design agar tampilan tetap
      rapi di berbagai ukuran layar.
    </p>

    <div class="container">
      <div class="box1">Kotak 1</div>
      <div class="box2">Kotak 2</div>
      <div class="box3">Kotak 3</div>
    </div>
  </body>
</html>
