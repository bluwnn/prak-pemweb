<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Praktikum CSS</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 20px;
        background-color: #add8e6;
        font-family: Arial, sans-serif;
      }

      h1 {
        color: white;
        font-size: 40px;
        text-align: center;
        margin: 0 0 20px;
      }

      p {
        max-width: 800px;
        margin: 0 auto 20px;
        background-color: #d3d3d3;
        color: black;
        padding: 15px;
        border-radius: 10px;
        line-height: 1.6;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .box1,
      .box2,
      .box3 {
        border: 2px solid black;
        padding: 10px;
        height: 150px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        text-align: center;
      }

      .box1 {
        background-color: #ff9999;
      }

      .box2 {
        background-color: #99ff99;
      }

      .box3 {
        background-color: #9999ff;
      }

      @media (max-width: 768px) {
        .container {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 28px;
        }

        .container {
          grid-template-columns: 1fr;
        }

        .box1,
        .box2,
        .box3 {
          height: 120px;
        }

        p {
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <h1>Praktikum CSS</h1>

    <p>
      Halaman ini dibuat menggunakan CSS Grid dan responsive design. Tampilan
      akan menyesuaikan ukuran layar agar tetap rapi dan nyaman dibaca di
      desktop, tablet, maupun smartphone.
    </p>

    <div class="container">
      <div class="box1">Kotak 1<br />Merah Muda</div>
      <div class="box2">Kotak 2<br />Hijau Muda</div>
      <div class="box3">Kotak 3<br />Biru Muda</div>
    </div>
  </body>
</html>
