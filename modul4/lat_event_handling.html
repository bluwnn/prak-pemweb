<!doctype html>
<html lang="en">
  <head>
    <title>Latihan Event Handling</title>

    <style>
      #inputNama {
        border: 2px solid #ccc;
        padding: 8px;
      }

      #inputNama:focus {
        border-color: green;
      }
    </style>
  </head>

  <body>
    <h3>Event Gambar Interaktif</h3>

    <img
      id="gambar"
      src="https://placehold.co/200x150/e8e8e8/000?text=Foto+Awal"
      alt="gambar"
      onmouseover="gantiGambar()"
      onmouseout="kembalikanGambar()"
    />

    <hr />

    <label>Masukkan Nama:</label>
    <input type="text" id="inputNama" onchange="tampilkanOutput()" />

    <p>Output: <span id="hasil"></span></p>

    <script>
      function gantiGambar() {
        document.getElementById("gambar").src =
          "https://placehold.co/200x150/2ecc71/fff?text=Mouse+Diatas+Gambar";
      }

      function kembalikanGambar() {
        document.getElementById("gambar").src =
          "https://placehold.co/200x150/e8e8e8/000?text=Foto+Awal";
      }

      function tampilkanOutput() {
        var nama = document.getElementById("inputNama").value;

        document.getElementById("hasil").innerHTML =
          "Halo, <b>" + nama + "</b>";
      }
    </script>
  </body>
</html>
